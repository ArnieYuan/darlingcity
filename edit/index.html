<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Edit Activity</title><link rel="stylesheet" href="../styles.css"><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/><style>body {
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
            height: 100vh;
            box-sizing: border-box;
        }
        .main-layout {
            display: flex;
            flex-direction: row;
            height: 100%;
            gap: 20px;
        }
        .container {
            display: flex;
            flex-direction: column;
            flex: 1;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            margin-top: 0;
        }
        .controls {
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        select, button {
            padding: 8px 12px;
            font-size: 16px;
        }
        button {
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background-color: #45a049;
        }
        #share-btn {
            background-color: #2196F3;
        }
        #share-btn:hover {
            background-color: #0b7dda;
        }
        textarea {
            flex: 1;
            width: 100%;
            font-family: monospace;
            font-size: 14px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: none;
            box-sizing: border-box;
        }
        #status-message {
            margin-top: 10px;
            font-weight: bold;
        }
        /* Stats Panel */
        .stats-wrapper {
            position: relative;
            width: 350px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease;
        }
        .stats-wrapper.collapsed {
            width: 0;
            padding: 0;
        }
        .stats-wrapper.collapsed .stats-content {
            display: none;
        }
        .stats-toggle-btn {
            position: absolute;
            top: 20px;
            left: -20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: white;
            box-shadow: -2px 2px 4px rgba(0,0,0,0.1);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            z-index: 10;
        }
        .stats-toggle-btn:hover {
            background-color: #f9f9f9;
        }
        .stats-toggle-btn .material-symbols-outlined {
            font-size: 24px;
            color: #333;
        }
        .stats-content {
            padding: 20px;
            padding-left: 30px; /* Space for the toggle button */
            overflow-y: auto;
            flex: 1;
            box-sizing: border-box;
            width: 350px; /* Fixed width to prevent collapsing issues */
        }
        .stats-content h2 {
            margin-top: 0;
            font-size: 18px;
        }
        .stat-item {
            background-color: #f9f9f9;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            border: 1px solid #eee;
        }
        .stat-item h3 {
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 14px;
            color: #333;
            word-break: break-all;
        }
        .stat-item p {
            margin: 0 0 5px 0;
            font-size: 12px;
            color: #666;
        }
        .stat-list {
            margin: 0;
            padding-left: 20px;
            font-size: 12px;
        }
        .stat-list-title {
            font-size: 12px;
            font-weight: bold;
            margin: 5px 0 2px 0;
        }
        .correct-list li { color: #2e7d32; }
        .incorrect-list li { color: #c62828; }</style><script defer="defer" src="../edit.93300fd6eccca419a37e.js"></script></head><body><div class="main-layout"><div class="container"><h1>Edit Activity</h1><div class="controls"><select id="script-select"><option value="">Select an activity...</option></select> <button id="save-btn">Save</button> <button id="share-btn">Share</button> <span id="status-message"></span></div><textarea id="script-editor" placeholder="Select an activity to edit its JSON, or paste a new activity or an array of activities here to add them..."></textarea></div><div class="stats-wrapper" id="stats-panel"><button class="stats-toggle-btn" id="stats-toggle-btn" aria-label="Toggle Stats Panel"><span class="material-symbols-outlined" id="stats-toggle-icon">chevron_right</span></button><div class="stats-content"><h2>Interaction Stats</h2><div id="stats-list"></div></div></div></div></body></html>
